<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA | Cadastro</title>
    <link rel="shortcut icon" href="../public/assets/imgs/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="../public/assets/style.css">

    <!-- Icones do cadastro/login -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    </style>
</head>

<body class="LoginCadastro">
    <main class="Cadastro">
        <header>
            <img src="../public/assets/imgs/Logo_PHA.png" alt="Logo PHA">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="">Como Jogar</a></li>
                <li><a href="#">Regras</a></li>
                <li><a href="#">Quiz</a></li>
            </ul>
        </header>

        <div class="authentication">

            <div class="container">
                <form class="formulario">
                    <h1> Criar Conta </h1>

                    <div class="campo">
                        <i class="fa fa-user"></i>
                        <input type="text" id="input_nome" placeholder="Nome">
                    </div>

                    <div class="campo">
                        <i class="fa fa-user"></i>
                        <input type="text" id="input_sobrenome" placeholder="Sobrenome">
                    </div>

                    <div class="campo">
                        <i class="fa fa-envelope"></i>
                        <input type="email" id="input_email" placeholder="Email">
                    </div>

                    <div class="campo">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="input_senha" placeholder="Senha">
                    </div>

                    <div class="campo">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="input_confirmarSenha" placeholder="Confirme senha">
                    </div>

                    <br>
                    <p> Já possui uma conta? <a href="login.html">Login</a></p>
                    <div id="div_mensagem"></div>

                    <button onclick="cadastrar()"> Cadastrar </button>
                </form>
            </div>

            <div class="background_cadastro">

                <div class="content_cadastro">
                    <h1>Bem vindo devolta!</h1>

                </div>

            </div>

        </div>
    </main>
</body>

</html>
