<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA | Dashboard</title>
    <link rel="shortcut icon" href="./assets/imgs/icon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="dashboard" onload="media()">

    <nav>
        <div class="user">
            <img src="./assets/imgs/perfil-de-usuario-Ambas.png" alt="">
            <div id="div_nome"></div>
            <div id="div_email"></div>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#rules">Regras</a></li>
            <li><a href="index.html#fundamentals">Como Jogar</a></li>
            <li><a href="quiz.html">Quiz</a></li>
        </ul>
    </nav>

    <div class="dashboard-content">
        
        <div class="containers">
            <div class="kpi-content">
                <a>Média geral de acertos</a>
                <div class="kpi-information" id="media_geral"> 8 </div>
            </div>
            <div class="kpi-content">
                <a>Média de acertos do Usuário</a>
                <div class="kpi-information" id="media_usuario"> 7.5 </div>
                <div id="mensagem_usuario"></div>
            </div>
            <div class="kpi-content">
                <a>Melhor jogador(a) do Quiz</a>
                <div class="kpi-information" id="melhor_jogador"> Pedro </div>
            </div>
        </div>

        <div class="containers">
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="mySecondChart"></canvas>
            </div>
        </div>

    </div>
</body>
<script>
    function media() {
        let mediaUsuario = 12;
        let mediaGeral = 15;

        // let mediaUsuario = Number(media_usuario.value);
        // let mediaGeral = Number(media_geral.value);

        if (mediaUsuario > mediaGeral) { // Se a media do usuario passar a geral fica verde
            document.getElementById('media_usuario').style.color = "green";
            mensagem_usuario.innerHTML += `<br> Você está acima da média`
        } else {
            document.getElementById('media_usuario').style.color = "red";
            mensagem_usuario.innerHTML += `<br> Você está abaixo da média`
            document.getElementById('mensagem_usuario').style.color = "red";

        }
    }
    
    div_nome.innerHTML = sessionStorage.NOME_USUARIO + ' ' + sessionStorage.SOBRENOME_USUARIO;
    div_email.innerHTML = sessionStorage.EMAIL_USUARIO;

    const ctx = document.getElementById('myChart');

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: ['1° Tentativa', '2° Tentativa', '3° Tentativa', '4° Tentativa', '5° Tentativa'],
            datasets: [{
                label: 'Acertos',
                data: [7, 6, 8, 7, 10],
                borderWidth: 7,
                backgroundColor: 'Green',
                borderColor: 'Green'
            },
            {
                label: 'Erros',
                data: [3, 4, 2, 3, 0],
                borderWidth: 7,
                backgroundColor: 'Red',
                borderColor: 'Red'
            }],
        },

        options: {
            scales: {
                y: {
                    beginAtZero: false
                }
            }
        }
    });

    const ctx2 = document.getElementById('mySecondChart');

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: ['Ana', 'Nicolas', 'David', 'Matheus', 'Pedro'],
            datasets: [
                {
                    label: 'Acertos',
                    data: [5, 6, 7, 8, 10],
                    borderWidth: 7,
                    backgroundColor: 'Orange',
                    borderColor: 'Orange'
                }],
        },

        options: {
            scales: {
                y: {
                    beginAtZero: true
                }
            }
        }
    });
</script>

</html>
