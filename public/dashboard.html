<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA | Dashboard</title>
    <link rel="shortcut icon" href="./assets/imgs/icon.png" type="image/x-icon">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="dashboard" onload="obterDados(), obterDadosRanking()">

    <nav>
        <div class="user">
            <img src="./assets/imgs/perfil-de-usuario-Ambas.png" alt="">
            <div id="div_nome"></div>
            <div id="div_email"></div>
        </div>

        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#rules">Regras</a></li>
            <li><a href="index.html#fundamentals">Como Jogar</a></li>
            <li><a href="quiz.html">Quiz</a></li>
        </ul>
    </nav>

    <div class="dashboard-content">

        <div class="containers">
            <div class="kpi-content">
                <a>Média geral de acertos</a>
                <div class="kpi-information" id="media_geral"></div>
            </div>
            <div class="kpi-content">
                <a>Média de acertos do Usuário</a>
                <div class="kpi-information" id="media_usuario"></div>
                <div id="mensagem_usuario"></div>
            </div>
            <div class="kpi-content">
                <a>Porcentagem de acertos</a>
                <div class="kpi-information" id="porcentagem_acertos"> </div>
                <div id="porcentagem_mensagem"></div>
            </div>
        </div>

        <div class="containers">
            <div class="chart-container">
                <canvas id="myChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="mySecondChart"></canvas>
            </div>
        </div>
        <div class="containers">
            <div class="chart-container">
                <canvas id="myThirdChart"></canvas>
            </div>
            <div class="chart-container">
                <canvas id="myFourthChart"></canvas>
            </div>
        </div>

    </div>
</body>
<script>
    div_nome.innerHTML = sessionStorage.NOME_USUARIO + ' ' + sessionStorage.SOBRENOME_USUARIO;
    div_email.innerHTML = sessionStorage.EMAIL_USUARIO;

    function media() {
        let mediaUsuario = mediaAcertos;
        let mediaGeral = conta;

        if (mediaUsuario > mediaGeral) { // Se a media do usuario passar a geral fica verde
            document.getElementById('media_usuario').style.color = "green";
            mensagem_usuario.innerHTML += `<br> Você está acima da média`
            document.getElementById('mensagem_usuario').style.color = "green";

        } else if (mediaUsuario == mediaGeral) { // Se a media do usuario passar a geral fica verde
            document.getElementById('media_usuario').style.color = "orange";
            mensagem_usuario.innerHTML += `<br> Você está na média`
            document.getElementById('mensagem_usuario').style.color = "orange";

        } else {
            document.getElementById('media_usuario').style.color = "red";
            mensagem_usuario.innerHTML += `<br> Você está abaixo da média`
            document.getElementById('mensagem_usuario').style.color = "red";
        }
    }

    function porcentagem() {
        let porcentagemAcertos = (certas / 15) * 100;
        porcentagem_acertos.innerHTML = porcentagemAcertos.toFixed(1) + "%";

        console.log(porcentagemAcertos);

        if (porcentagemAcertos <= 30) {
            porcentagem_mensagem.innerHTML = "Parece que você não estudou...";
        } else if (porcentagemAcertos > 30 && porcentagemAcertos < 70) {
            porcentagem_mensagem.innerHTML = "Pode melhorar na próxima, hein!";
        } else if (porcentagemAcertos == 100) {
            porcentagem_mensagem.innerHTML = "Caramba! Gabaritou..";
        } else {
            porcentagem_mensagem.innerHTML = "Uau, parabéns!";
        }
    }

    // Função chamada ao carregar a página para obter e processar os dados
    function obterDados() {
        let id = sessionStorage.ID_USUARIO;
        // Aqui seria a função que obteria os dados do banco de dados
        // No caso, aqui você colocaria o fetch que teria o endereço da sua rota que você criou na pasta /routes e chamaria a função plotarGraficoLinha nessa função. Exemplo:
        console.log(id)

        fetch(`/dados/obterDados/${id}`)
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                console.log(data);
                if (data.length > 0) {
                    plotarGraficoTentativas(data);
                }
            })
            .catch(function (err) {
                console.log(err);
            })
    }

    let certas = 0;
    let mediaAcertos = 0;
    // Função para plotar o gráfico de linha
    function plotarGraficoTentativas(dados) {
        var acertos = [];
        var erros = [];
        var tentativas = [];
        var pontuacao = [];
        var tentativasP = [];

        let somaAcertos = 0;
        mediaAcertos = 0;

        certas = Number(dados[dados.length - 1].acertos);

        for (var j = 0; j < dados.length; j++) {
            somaAcertos += Number(dados[j].acertos);
        }
        mediaAcertos = somaAcertos / dados.length;
        media_usuario.innerHTML = mediaAcertos.toFixed(2); // media de acertos usuario

        //Preenchendo os arrays com os dados
        if (dados.length > 0 & dados.length < 6) { // adicionando 5 valores para as listas acertos, erros e tentativas
            for (var i = 0; i < dados.length; i++) { // para serem plotadas no gráfico
                acertos.push(dados[i].acertos);
                erros.push(dados[i].erros);

                tentativas.push(`${i + 1}ª Tentativa`);
            }

        } else {
            for (var i = dados.length - 5; i < dados.length; i++) {
                acertos.push(dados[i].acertos);
                erros.push(dados[i].erros);

                tentativas.push(`${i + 1}ª Tentativa`);
            }
        }

        if (dados.length > 0 & dados.length < 10) { // adicionando na lista pontuação para o gráfico de pontos
            for (var i = 0; i < dados.length; i++) {
                pontuacao.push(dados[i].pontuacao);
                tentativasP.push(`${i + 1}ª`);
            }
        } else {
            for (var i = dados.length - 10; i < dados.length; i++) {
                pontuacao.push(dados[i].pontuacao);
                tentativasP.push(`${i + 1}ª`);
            }
        }

        // Capturando o elemento canvas pelo id 
        var ctx = document.getElementById('myChart');
        // Criando o gráfico de linha usando o Chart.js
        var myChart = new Chart(ctx, {
            type: 'bar', // Tipo de gráfico: Barra
            data: { // Dados para o gráfico
                labels: tentativas, // Rótulos no eixo X
                datasets: [
                    {
                        label: 'Acertos',
                        data: acertos,
                        backgroundColor: 'green',
                        borderColor: 'green',
                        borderWidth: 3
                    },
                    {
                        label: 'Erros',
                        data: erros,
                        backgroundColor: 'red',
                        borderColor: 'red',
                        borderWidth: 3
                    }
                ]
            },
            options: {
                responsive: true,

                scales: {
                    y: {
                        beginAtZero: true,
                        max: 16
                    }
                }
            }
        });

        var ctx2 = document.getElementById('myThirdChart').getContext('2d');

        var myChart2 = new Chart(ctx2, {
            type: 'line',
            data: {
                labels: tentativasP,
                datasets: [{
                    label: 'Pontuação das suas última 10 tentativas',
                    data: pontuacao,
                    backgroundColor: '#02042a',
                    borderColor: '#02042a',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,

                scales: {
                    y: {
                        beginAtZero: true,
                        max: 20
                    }
                }
            }
        });
        porcentagem();
    }

    function obterDadosRanking() {

        fetch(`/dados/obterDadosRanking`)
            .then(function (response) {
                return response.json();
            })
            .then(function (data) {
                console.log(data);
                if (data.length > 0) {
                    plotarGraficoRanking(data);
                }
            })
            .catch(function (err) {
                console.log(err);
            })
    }

    let conta = 0;
    // Função para plotar o gráfico de Ranking
    function plotarGraficoRanking(dados) {
        var pontuacao = [];
        var nome = [];
        var posicao = [];

        let mediaGeral = 0;
        let quantidade = 0;
        conta = 0;

        //Preenchendo os arrays com os dados
        for (var i = 0; i < 5; i++) {
            pontuacao.push(dados[i].pontuacao);
            nome.push(dados[i].nome);
            posicao.push(`${i + 1}º - ${nome[i]}`);
        }

        for (var i = 0; i < dados.length; i++) {
            quantidade += Number(dados[i].quantidade);
            mediaGeral += Number(dados[i].mediaGeral) * Number(dados[i].quantidade);
        }
        conta = mediaGeral / quantidade;
        media_geral.innerHTML = conta.toFixed(2);

        var ctx = document.getElementById('mySecondChart').getContext('2d');

        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: posicao,
                datasets: [{
                    label: 'Leaderboard de Pontuação',
                    data: pontuacao,
                    backgroundColor: 'orange',
                    borderColor: 'red',
                    borderWidth: 3
                }]
            },
            options: {
                responsive: true,

                scales: {
                    y: {
                        beginAtZero: true,
                        max: 20
                    }
                }
            }
        });

        media();
    }
</script>

</html>
