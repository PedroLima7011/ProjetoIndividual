<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHA | Login</title>
    <link rel="shortcut icon" href="../public/assets/imgs/icon.png" type="image/x-icon">
    <link rel="stylesheet" href="../public/assets/style.css">
    <script src="../public/assets/validacoes.js"></script>
    
    <!-- Icones do cadastro/login -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    /style>
</head>

<body class="LoginCadastro">
    <main class="Login">

        <header>
            <img src="../public/assets/imgs/Logo_PHA.png">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="">Como Jogar</a></li>
                <li><a href="#">Regras</a></li>
                <li><a href="#">Quiz</a></li>
            </ul>
        </header>

        <div class="authentication">

            <div class="background_login">

                <div class="content_login">
                    <h1>Bem vindo devolta!</h1>

                </div>
            </div>

            <form class="container">
                <div class="formulario">
                    <h1> Login </h1>

                    <div class="campo">
                        <i class="fa fa-user"></i>
                        <input type="email" id="input_email" placeholder="Email">
                    </div>

                    <div class="campo">
                        <i class="fa fa-lock"></i>
                        <input type="password" id="input_senha" placeholder="Senha">
                    </div>

                    <br>
                    <p> Ainda não possui uma conta? <a href="cadastro.html">Cadastro</a></p>
                    <div id="div_mensagem"></div>
                    <button onclick="logar()"> Logar </button>
                </div>
            </form>
        </div>
    </main>
</body>

</html>
